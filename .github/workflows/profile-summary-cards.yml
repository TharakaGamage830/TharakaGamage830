name: GitHub Profile Summary Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-summary-cards
    steps:
      - uses: actions/checkout@v4
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          # Try the default token first. If some cards come out empty
          # (this happens with private-repo stats), create a classic
          # Personal Access Token with "repo" + "read:user" scopes,
          # save it as a repo secret named SUMMARY_GITHUB_TOKEN,
          # then switch the line below to:
          # GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: "main"
          UTC_OFFSET: 5.5
          EXCLUDE: ""
          AUTO_PUSH: true