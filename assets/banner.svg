<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a">
        <animate attributeName="stop-color" values="#0f172a;#1e3a8a;#0f172a" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#1e293b">
        <animate attributeName="stop-color" values="#1e293b;#312e81;#1e293b" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="cubeTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <rect width="900" height="280" rx="18" fill="url(#bg)"/>

  <circle cx="50" cy="40" r="2" fill="#60a5fa" opacity="0.7">
    <animate attributeName="cy" values="40;20;40" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="230" r="2" fill="#c084fc" opacity="0.6">
    <animate attributeName="cy" values="230;210;230" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="30" cy="150" r="1.5" fill="#60a5fa" opacity="0.5">
    <animate attributeName="cy" values="150;130;150" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="250" r="2" fill="#60a5fa" opacity="0.4">
    <animate attributeName="cx" values="500;530;500" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="-20" cy="20" r="3" fill="#c084fc" opacity="0">
    <animateMotion path="M 0,0 L 950,240" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0" dur="7s" repeatCount="indefinite"/>
  </circle>

  <text x="60" y="115" font-family="Segoe UI, sans-serif" font-size="42" font-weight="700" fill="url(#textGrad)">
    Tharaka Gamage
  </text>
  <rect x="62" y="127" width="0" height="4" rx="2" fill="url(#textGrad)">
    <animate attributeName="width" values="0;330;330;0" keyTimes="0;0.3;0.85;1" dur="8s" repeatCount="indefinite"/>
  </rect>

  <text x="62" y="160" font-family="Fira Code, monospace" font-size="18" fill="#94a3b8">Full-Stack Engineer · TypeScript Ecosystem</text>
  <rect x="410" y="147" width="10" height="20" fill="#60a5fa">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <text x="62" y="190" font-family="Fira Code, monospace" font-size="14" fill="#64748b">React · Next.js · NestJS · Spring Boot · Tailwind</text>

  <path id="orbitOuter" d="M 780,140 a80,80 0 1,1 -0.1,0" fill="none"/>
  <path id="orbitInner" d="M 745,140 a45,45 0 1,0 -0.1,0" fill="none"/>

  <circle cx="700" cy="140" r="80" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="2 6"/>
  <circle cx="700" cy="140" r="45" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="2 6"/>

  <circle cx="700" cy="140" r="28" fill="#1e293b" stroke="url(#textGrad)" stroke-width="2"/>
  <text x="700" y="147" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0" font-family="Segoe UI">TG</text>

  <g>
    <rect x="-46" y="-11" width="92" height="22" rx="11" fill="#1e40af"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="#dbeafe" font-family="Fira Code, monospace">TypeScript</text>
    <animateMotion dur="16s" begin="0s" repeatCount="indefinite"><mpath href="#orbitOuter"/></animateMotion>
  </g>
  <g>
    <rect x="-36" y="-11" width="72" height="22" rx="11" fill="#312e81"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="#e0e7ff" font-family="Fira Code, monospace">Next.js</text>
    <animateMotion dur="16s" begin="3.2s" repeatCount="indefinite"><mpath href="#orbitOuter"/></animateMotion>
  </g>
  <g>
    <rect x="-38" y="-11" width="76" height="22" rx="11" fill="#7f1d1d"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="#fecaca" font-family="Fira Code, monospace">NestJS</text>
    <animateMotion dur="16s" begin="6.4s" repeatCount="indefinite"><mpath href="#orbitOuter"/></animateMotion>
  </g>
  <g>
    <rect x="-42" y="-11" width="84" height="22" rx="11" fill="#166534"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="#bbf7d0" font-family="Fira Code, monospace">Spring Boot</text>
    <animateMotion dur="16s" begin="9.6s" repeatCount="indefinite"><mpath href="#orbitOuter"/></animateMotion>
  </g>
  <g>
    <rect x="-30" y="-11" width="60" height="22" rx="11" fill="#0e7490"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="#cffafe" font-family="Fira Code, monospace">Tailwind</text>
    <animateMotion dur="16s" begin="12.8s" repeatCount="indefinite"><mpath href="#orbitOuter"/></animateMotion>
  </g>

  <g>
    <rect x="-32" y="-10" width="64" height="20" rx="10" fill="#134e4a"/>
    <text x="0" y="4" text-anchor="middle" font-size="10" fill="#99f6e4" font-family="Fira Code, monospace">Docker</text>
    <animateMotion dur="11s" begin="0s" repeatCount="indefinite"><mpath href="#orbitInner"/></animateMotion>
  </g>
  <g>
    <rect x="-40" y="-10" width="80" height="20" rx="10" fill="#1e3a8a"/>
    <text x="0" y="4" text-anchor="middle" font-size="10" fill="#bfdbfe" font-family="Fira Code, monospace">PostgreSQL</text>
    <animateMotion dur="11s" begin="3.7s" repeatCount="indefinite"><mpath href="#orbitInner"/></animateMotion>
  </g>
  <g>
    <rect x="-38" y="-10" width="76" height="20" rx="10" fill="#3f6212"/>
    <text x="0" y="4" text-anchor="middle" font-size="10" fill="#d9f99d" font-family="Fira Code, monospace">MongoDB</text>
    <animateMotion dur="11s" begin="7.4s" repeatCount="indefinite"><mpath href="#orbitInner"/></animateMotion>
  </g>

  <g transform="translate(830,55)">
    <g>
      <polygon points="0,-18 16,-9 0,0 -16,-9" fill="url(#cubeTop)" opacity="0.95"/>
      <polygon points="0,0 16,-9 16,9 0,18" fill="#3b82f6" opacity="0.85"/>
      <polygon points="0,0 -16,-9 -16,9 0,18" fill="#1d4ed8" opacity="0.9"/>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="6s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>
